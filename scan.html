<!DOCTYPE html>
<html>
<head>
<title>QR Scanner - Item Lookup</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        background: #f5f5f5;
        margin: 0;
        padding: 20px;
    }

    h1 {
        margin-bottom: 20px;
    }

    #scanner {
        width: 300px;
        margin: auto;
        display: none;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border-radius: 8px;
        border: none;
        background: #2196F3;
        color: white;
        cursor: pointer;
        margin-top: 20px;
    }

    button:hover {
        background: #1e88e5;
    }

</style>

</head>
<body>

<h1>Scan Item QR</h1>

<button onclick="startScanner()">SCAN QR</button>

<div id="scanner"></div>

<script>
function startScanner() {
    document.getElementById("scanner").style.display = "block";

    const html5QrCode = new Html5Qrcode("scanner");

    html5QrCode.start(
        { facingMode: "environment" },
        {
            fps: 10,
            qrbox: { width: 250, height: 250 }
        },
        qrMessage => {

            // Vibrate phone when QR detected
            if (navigator.vibrate) {
                navigator.vibrate(100);
            }

            // Redirect to image page
            const scannedCode = qrMessage.trim();
            window.location.href =
                "https://blockbinventory-del.github.io/qr-item-viewer/?code="
                + scannedCode;
        },
        errorMessage => {}
    ).catch(err => {
        alert("Camera error: " + err);
    });
}
</script>

</body>
</html>
