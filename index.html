<!DOCTYPE html>
<html>
<head>
<title>Item Image Lookup</title>
<style>
    body {
        font-family: Arial, sans-serif;
        text-align: center;
        padding: 30px;
        background: #f5f5f5;
    }
    h1 {
        margin-bottom: 10px;
    }
    img {
        max-width: 90%;
        height: auto;
        margin-top: 20px;
        border: 2px solid #ccc;
        border-radius: 12px;
        background: white;
        padding: 10px;
    }
    #status {
        font-size: 18px;
        font-weight: bold;
        margin-bottom: 15px;
    }
</style>
</head>

<body>

<h1>Item Image Lookup</h1>
<p id="status">Loading...</p>
<div id="result"></div>

<script>
function getParameter(name) {
    const url = new URL(window.location.href);
    return url.searchParams.get(name);
}

const scannedCode = getParameter("code");

if (!scannedCode) {
    document.getElementById("status").innerText = "No item code detected.";
    throw new Error("No code found");
}

const sheetURL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRjYWStNCQlxd6IyM__GLO-lsrnWUwuG1q7dfvjkTbSL_A-Y4cvkXfhMsXX04CKxjzdxTGvqSApwIct/pub?output=csv";

fetch(sheetURL)
    .then(response => response.text())
    .then(csv => {
        const rows = csv.split("\n").map(r => r.split(","));
        let foundImage = null;

        rows.forEach(row => {
            if (row[0].trim() === scannedCode.trim()) {
                foundImage = row[1].trim();
            }
        });

        if (foundImage) {
            document.getElementById("status").innerText = "Item Found: " + scannedCode;
            document.getElementById("result").innerHTML =
                `<img src="${foundImage}" alt="Item Image" /><p>${scannedCode}</p>`;
        } else {
            document.getElementById("status").innerText = "Item not found in database.";
        }
    })
    .catch(err => {
        document.getElementById("status").innerText = "Error loading data.";
        console.error(err);
    });
</script>

</body>
</html>
